name: "🚀 Release image"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: "Build and push the manager image"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout manager
        uses: actions/checkout@v4
        with:
          path: manager

      - name: Checkout web (pinned)
        uses: actions/checkout@v4
        with:
          repository: CryptOS-PKI/web
          ref: ${{ vars.WEB_RELEASE_REF || 'main' }}
          path: web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/cryptos-pki/manager
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: manager/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    name: "Package and push the Helm chart"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm package chart/fleet-manager --version "$version" --app-version "$version"
          helm push "fleet-manager-${version}.tgz" oci://ghcr.io/cryptos-pki/charts
