apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fleet-manager.name" . }}-config
  labels: {{- include "fleet-manager.labels" . | nindent 4 }}
data:
  config.yaml: |
    listen: {{ .Values.listen | quote }}
    authBypass: {{ .Values.authBypass }}
    corsOrigins: {{ toJson .Values.corsOrigins }}
    {{- if not .Values.authBypass }}
    tlsCert: /etc/cryptos/fleet/tls/tls.crt
    tlsKey: /etc/cryptos/fleet/tls/tls.key
    operatorCAPath: /etc/cryptos/fleet/operator-ca/operator-ca.pem
    {{- end }}
    nodes: {{ toJson .Values.nodes }}
