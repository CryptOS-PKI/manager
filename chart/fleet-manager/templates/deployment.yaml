apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fleet-manager.name" . }}
  labels: {{- include "fleet-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "fleet-manager.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels: {{- include "fleet-manager.labels" . | nindent 8 }}
    spec:
      containers:
        - name: manager
          image: {{ include "fleet-manager.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-config", "/etc/cryptos/fleet/config.yaml"]
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/cryptos/fleet/config.yaml
              subPath: config.yaml
            {{- if not .Values.authBypass }}
            - name: tls
              mountPath: /etc/cryptos/fleet/tls
              readOnly: true
            - name: operator-ca
              mountPath: /etc/cryptos/fleet/operator-ca
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "fleet-manager.name" . }}-config
        {{- if not .Values.authBypass }}
        - name: tls
          secret:
            secretName: {{ required "tls.certSecret is required when authBypass is false" .Values.tls.certSecret }}
        - name: operator-ca
          configMap:
            name: {{ required "operatorCA.configMap is required when authBypass is false" .Values.operatorCA.configMap }}
        {{- end }}
