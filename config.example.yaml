# CryptOS Fleet Manager — example configuration.
#
# Copy to config.yaml (gitignored) and set the real paths for your environment.
# The paths below are placeholders.
#
# Node inventory for a local nodeID / TPM-less QEMU fleet. Map each node's FQDN
# to the host in /etc/hosts; the QEMU host-forwards land on each node's guest
# :443. The manager dials each node's mTLS gRPC listener presenting that node's
# admin client cert+key. The node server cert is an ephemeral self-signed cert,
# so the manager relaxes server verification and relies on client-auth (which
# the node enforces). caCertPath is that node's identity chain
# (`cryptosctl identity show -o pem`): root = 1 cert, intermediate = 2 certs
# [intermediate, root].
listen: "127.0.0.1:8080"
corsOrigins: ["http://localhost:5173", "http://127.0.0.1:5173"]
authBypass: true
nodes:
  - name: pki-root
    endpoint: "pki-root.acme.com:4443"
    role: root
    adminCertPath: "/etc/cryptos/fleet/pki-root/admin.crt"
    adminKeyPath: "/etc/cryptos/fleet/pki-root/admin.key"
    caCertPath: "/etc/cryptos/fleet/pki-root/ca.pem"
  - name: pki-inter
    endpoint: "pki-inter.acme.com:4444"
    role: intermediate
    adminCertPath: "/etc/cryptos/fleet/pki-inter/admin.crt"
    adminKeyPath: "/etc/cryptos/fleet/pki-inter/admin.key"
    caCertPath: "/etc/cryptos/fleet/pki-inter/ca.pem"
