name: Bug report
description: Report a defect in the Fleet Manager backend
title: "fix: "
labels: ["bug"]
assignees: ["Bugs5382"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: The actual behavior, with any error output or logs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps — request, config, or UI action that triggers it.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: manager version/commit, deployment target (Kubernetes / docker compose / single binary), Postgres version, and browser + version if the UI is involved.
    validations:
      required: false
