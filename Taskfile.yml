version: "3"

tasks:
  build:
    desc: Build every package.
    cmds:
      - go build ./...
  fmt:
    desc: Check that every Go file is gofmt-clean.
    cmds:
      - test -z "$(gofmt -l . | grep -v '^vendor/')" || { echo 'not gofmt-clean; run gofmt -w .'; gofmt -l .; exit 1; }
  vet:
    desc: Run go vet over every package.
    cmds:
      - go vet ./...
  lint:
    desc: Run golangci-lint over every package.
    cmds:
      - golangci-lint run ./...
  test:
    desc: Run the test suite. Postgres integration tests skip unless MANAGER_TEST_DATABASE_URL is set.
    cmds:
      - go test ./...
  ci:
    desc: The full pre-push gate (gofmt, vet, golangci-lint, test); mirrors the git pre-push hook.
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test
  run:
    desc: Run the manager server against config.yaml.
    cmds:
      - go run ./cmd/manager -config config.yaml
  license:
    desc: Verify every source file carries the Apache 2.0 license header (CI; never writes).
    cmds:
      - go install github.com/Bugs5382/golic/cmd/golic@v0.2.0
      - golic inject -t apache2 -c "2026 Shane" --dry -x
  license:fix:
    desc: Inject the Apache 2.0 header into any source file missing it.
    cmds:
      - go install github.com/Bugs5382/golic/cmd/golic@v0.2.0
      - golic inject -t apache2 -c "2026 Shane"
